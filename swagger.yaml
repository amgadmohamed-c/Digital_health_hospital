openapi: 3.0.3
info:
  title: Hospital Management API
  description: >
    REST API for a hospital management system covering authentication, patient
    profiles, doctor profiles, appointments, emergency cases, surgeries, and
    real-time chat. All routes except /signup, /login, /reauth, and /fetchdata
    require a Bearer JWT access token.
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Generic ───────────────────────────────────────────────
    ErrorMessage:
      type: object
      properties:
        err:
          type: string
      example:
        err: "Some error message"

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      example:
        message: "Operation successful"

    # ── Auth ──────────────────────────────────────────────────
    SignupRequest:
      type: object
      required: [name, email, password, phone, age, ssn]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        phone:
          type: string
        age:
          type: integer
        ssn:
          type: string
        gender:
          type: string
          enum: [MALE, FEMALE]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        access_Token:
          type: string
        expiresin:
          type: string
          format: date-time
        refresh_Token:
          type: string
        role:
          type: string
          enum: [ADMIN, DOCTOR, NURSE, PATIENT]
        id:
          type: string
          description: Patient or Doctor record id (present based on role)

    ReauthRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ReauthResponse:
      type: object
      properties:
        access_Token:
          type: string
        expiresin:
          type: string
          format: date-time

    # ── Admin ─────────────────────────────────────────────────
    CreateDoctorRequest:
      type: object
      required: [name, email, password, phone, age]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        department:
          type: string
        specialization:
          type: string
        phone:
          type: string
        age:
          type: integer
        gender:
          type: string
          enum: [MALE, FEMALE]

    CreateNurseRequest:
      type: object
      required: [name, email, password, phone, age]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        department:
          type: string
        phone:
          type: string
        age:
          type: integer
        gender:
          type: string
          enum: [MALE, FEMALE]

    # ── Doctor ────────────────────────────────────────────────
    AvailabilitySlotsRequest:
      type: object
      required: [doctorId]
      properties:
        doctorId:
          type: string

    BookAppointmentRequest:
      type: object
      required: [doctorId, type, startTime]
      properties:
        doctorId:
          type: string
        type:
          type: string
          enum: [HOSPITAL, ONLINE]
        appointmentType:
          type: string
          enum: [HOSPITAL, ONLINE]
          description: Alias for `type`
        startTime:
          type: string
          format: date-time
        scheduledAt:
          type: string
          format: date-time
          description: Alias for `startTime`
        status:
          type: string
          enum: [SCHEDULED, ACTIVE, COMPLETED, CANCELLED]
          default: SCHEDULED
        duration:
          type: integer
          default: 30
          description: Duration in minutes

    CancelAppointmentRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
        appintmentStatus:
          type: string
          enum: [CANCELLED]

    SetAvailabilityRequest:
      type: array
      items:
        type: object
        properties:
          dayOfWeek:
            type: string
            enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]
          startTime:
            type: string
            example: "09:00"
          endTime:
            type: string
            example: "17:00"

    SetVisitDataRequest:
      type: object
      properties:
        diagnosis:
          type: string
        notes:
          type: string

    # ── Emergency ─────────────────────────────────────────────
    CreateEmergencyCaseRequest:
      type: object
      required: [department, priority]
      properties:
        patientEmail:
          type: string
          format: email
          description: Email of existing patient. Omit for walk-in.
        ssn:
          type: string
          description: Required if patientEmail is not provided (walk-in)
        gender:
          type: string
          enum: [MALE, FEMALE]
        doctorId:
          type: string
        department:
          type: string
        priority:
          type: string

    UpdateEmergencyCaseRequest:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [WAITING, IN_TREATMENT, STABLE, ADMITTED, DISCHARGED]

    # ── Surgery ───────────────────────────────────────────────
    CreateSurgeryRequest:
      type: object
      required: [patientId, surgeonId, surgeryType]
      properties:
        patientId:
          type: string
        surgeonId:
          type: string
        roomId:
          type: string
        emergencyQueueId:
          type: string
        surgeryType:
          type: string
        priority:
          type: string
        notes:
          type: string
        scheduledAt:
          type: string
          format: date-time
        estimatedDuration:
          type: integer
          description: Duration in minutes

    SurgeryNoteRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string

    # ── Chat ──────────────────────────────────────────────────
    StartChatSessionRequest:
      type: object
      required: [appointmentId]
      properties:
        appointmentId:
          type: string

    ChatSession:
      type: object
      properties:
        id:
          type: string
        appointmentId:
          type: string
        createdAt:
          type: string
          format: date-time

    ChatMessagesResponse:
      type: object
      properties:
        session:
          $ref: '#/components/schemas/ChatSession'
        messages:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              sessionId:
                type: string
              senderId:
                type: string
              content:
                type: string
              createdAt:
                type: string
                format: date-time

security:
  - BearerAuth: []

paths:

  # ════════════════════════════════════════════════════════════
  # AUTH  (no token required)
  # ════════════════════════════════════════════════════════════
  /signup:
    post:
      tags: [Auth]
      summary: Register a new patient account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Patient created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  userId:
                    type: string
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /login:
    post:
      tags: [Auth]
      summary: Authenticate and receive JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens and user role returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: string
                example: "user doesnt exist"

  /reauth:
    post:
      tags: [Auth]
      summary: Refresh access token using a refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReauthRequest'
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReauthResponse'
        '401':
          description: Token invalid or not found
          content:
            application/json:
              schema:
                type: string
        '403':
          description: Token expired
          content:
            application/json:
              schema:
                type: string

  # ════════════════════════════════════════════════════════════
  # PUBLIC UI DATA  (no token required)
  # ════════════════════════════════════════════════════════════
  /fetchdata:
    get:
      tags: [UI Data]
      summary: Fetch aggregated UI data (departments, specializations, etc.)
      security: []
      responses:
        '200':
          description: UI data payload
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Failed to fetch data
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  # ════════════════════════════════════════════════════════════
  # ADMIN  (token + ADMIN role required)
  # ════════════════════════════════════════════════════════════
  /createdoctor:
    post:
      tags: [Admin]
      summary: Create a new doctor account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDoctorRequest'
      responses:
        '201':
          description: Doctor created; returns new doctor record
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request / invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '409':
          description: Conflict — user already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /createnurse:
    post:
      tags: [Admin]
      summary: Create a new nurse account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNurseRequest'
      responses:
        '201':
          description: Nurse created; returns new nurse record
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /get/patients/all:
    get:
      tags: [Admin]
      summary: Get all patient records
      responses:
        '200':
          description: Array of patient records
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /get/doctors/all:
    get:
      tags: [Admin]
      summary: Get all doctor records
      responses:
        '200':
          description: Array of doctor records
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /get/nurses/all:
    get:
      tags: [Admin]
      summary: Get all nurse records
      responses:
        '200':
          description: Array of nurse records
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /delete/{id}/user:
    delete:
      tags: [Admin]
      summary: Delete a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "user deleted"
                  user:
                    type: object
        '400':
          description: User id is undefined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /doctor/{id}/workload:
    get:
      tags: [Admin]
      summary: Get a doctor's workload (appointments + surgeries summary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workload data for the specified doctor
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  # ════════════════════════════════════════════════════════════
  # PATIENT PROFILE
  # ════════════════════════════════════════════════════════════
  /editprofile:
    put:
      tags: [Patient Profile]
      summary: Edit the authenticated patient's profile (supports file uploads)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                age:
                  type: integer
                gender:
                  type: string
                  enum: [MALE, FEMALE]
                password:
                  type: string
                bloodtype:
                  type: string
                allergies:
                  type: string
                recordTitle:
                  type: string
                profile:
                  type: string
                  format: binary
                  description: Profile image (max 1)
                records:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Medical record files (max 10)
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /patient/records:
    post:
      tags: [Patient Profile]
      summary: Upload one or more medical records for the authenticated patient
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [recordTitle, records]
              properties:
                recordTitle:
                  type: string
                records:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Medical record files (max 10)
      responses:
        '201':
          description: Record added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Validation error (missing title or files)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /patient/me:
    get:
      tags: [Patient Profile]
      summary: Get the authenticated patient's own profile
      responses:
        '200':
          description: Patient profile object
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error fetching profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /patient/{id}/profile:
    get:
      tags: [Patient Profile]
      summary: Get a patient's profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Patient profile object
          content:
            application/json:
              schema:
                type: object
        '400':
          description: User id is undefined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /patient/{id}/appointments:
    get:
      tags: [Patient Profile]
      summary: Get all appointments for a patient (patient reads own via JWT)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Array of appointment objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '403':
          description: Forbidden — patient access only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  # ════════════════════════════════════════════════════════════
  # DOCTOR PROFILE
  # ════════════════════════════════════════════════════════════
  /editdoctorprofile:
    put:
      tags: [Doctor Profile]
      summary: Edit the authenticated doctor's profile (supports profile image upload)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                specialty:
                  type: string
                bio:
                  type: string
                experience:
                  type: string
                profile:
                  type: string
                  format: binary
                  description: Profile image
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /doctor/me:
    get:
      tags: [Doctor Profile]
      summary: Get the authenticated doctor's own profile
      responses:
        '200':
          description: Doctor profile object
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error fetching profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /doctor/{id}/profile:
    get:
      tags: [Doctor Profile]
      summary: Get a doctor's profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Doctor profile object
          content:
            application/json:
              schema:
                type: object
        '400':
          description: User id is undefined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  # ════════════════════════════════════════════════════════════
  # DOCTOR — APPOINTMENTS & AVAILABILITY
  # ════════════════════════════════════════════════════════════
  /available/appointment/slots:
    post:
      tags: [Appointments]
      summary: Get available appointment slots for a specific doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilitySlotsRequest'
      responses:
        '200':
          description: Array of available slots, or message if none found
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      type: object
                  - $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /new/appointment:
    post:
      tags: [Appointments]
      summary: Book a new appointment for the authenticated patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookAppointmentRequest'
      responses:
        '200':
          description: Appointment object
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Validation error or booking failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /cancel/appointment:
    patch:
      tags: [Appointments]
      summary: Cancel an appointment (staff only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAppointmentRequest'
      responses:
        '200':
          description: Appointment cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Cancellation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Forbidden — staff only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /{doctorId}/availability:
    put:
      tags: [Appointments]
      summary: Set weekly availability schedule for a doctor (staff only)
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAvailabilityRequest'
      responses:
        '200':
          description: Availability updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /appointment/{appointmentId}/visit-data:
    put:
      tags: [Appointments]
      summary: Set diagnosis and notes for a completed appointment visit
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetVisitDataRequest'
      responses:
        '200':
          description: Visit data updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
        '400':
          description: Validation error
          content:
            application/json:
              schema:
